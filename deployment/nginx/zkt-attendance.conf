# =============================================================================
# Nginx Configuration for ZKTeco Attendance System
# =============================================================================
# Place this file at: /etc/nginx/sites-available/zkt-attendance
# Then symlink:  ln -s /etc/nginx/sites-available/zkt-attendance /etc/nginx/sites-enabled/
# Test config:   nginx -t
# Reload:        systemctl reload nginx
# =============================================================================

server {
    listen 80;
    listen [::]:80;

    # ⚡ CHANGE THIS: your server's LAN IP or hostname
    server_name 192.168.1.100 your-server-hostname;

    root /var/www/zkt-attendance/public;
    index index.php;

    charset utf-8;

    # =========================================================================
    # Logging
    # =========================================================================
    access_log /var/log/nginx/zkt-attendance-access.log;
    error_log  /var/log/nginx/zkt-attendance-error.log;

    # =========================================================================
    # Max upload size (for photo sync, firmware, etc.)
    # =========================================================================
    client_max_body_size 20M;

    # =========================================================================
    # ZKTeco ADMS/PUSH Protocol — CRITICAL for device communication
    # =========================================================================
    # The ZKTeco devices send requests to /iclock/* endpoints.
    # These must be accessible without authentication/HTTPS redirect.
    # Keep-alive is important for device connections.
    # =========================================================================
    location /iclock/ {
        try_files $uri $uri/ /index.php?$query_string;

        # Longer timeouts for device communication
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    # =========================================================================
    # Health check endpoint
    # =========================================================================
    location /api/health {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # =========================================================================
    # Main Laravel application
    # =========================================================================
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # =========================================================================
    # PHP-FPM processing
    # =========================================================================
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Longer timeout for ZKTeco sync operations
        fastcgi_read_timeout 300;
    }

    # =========================================================================
    # Static assets caching
    # =========================================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
